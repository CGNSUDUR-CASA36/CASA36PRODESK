  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #060b12; font-family: 'Outfit', sans-serif; overflow: hidden; user-select: none; -webkit-user-select: none; }

    /* ===== STARS ===== */
    .stars-layer { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .star { position: absolute; border-radius: 50%; background: white; opacity: 0; animation: twinkle var(--dur) ease-in-out var(--delay) infinite; }
    @keyframes twinkle { 0%,100% { opacity:0; transform:scale(0.8); } 50% { opacity:var(--op); transform:scale(1); } }

    /* ===== LOGIN SCREEN ===== */
    #login-screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, #0f1e38 0%, #060b12 70%);
      transition: opacity 0.7s ease;
    }
    #login-screen.hidden { opacity: 0; pointer-events: none; }

    .login-box {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 48px 44px;
      width: 420px;
      max-width: 95vw;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    .login-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 900;
      color: #fff;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .login-logo span { color: #00c4ff; }
    .login-tagline {
      text-align: center;
      color: rgba(255,255,255,0.35);
      font-size: 0.78rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .login-tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }
    .login-tab {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.25s;
      color: rgba(255,255,255,0.4); background: transparent;
    }
    .login-tab.active {
      background: rgba(0,196,255,0.15);
      color: #00c4ff;
      box-shadow: 0 0 20px rgba(0,196,255,0.15);
    }

    .login-field { margin-bottom: 18px; }
    .login-field label {
      display: block; color: rgba(255,255,255,0.5); font-size: 0.75rem;
      letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;
    }
    .login-field input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif;
      font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: rgba(0,196,255,0.4); background: rgba(255,255,255,0.08); }

    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #0090c8, #00c4ff);
      border: none; border-radius: 12px; color: #fff;
      font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.25s; letter-spacing: 0.5px;
      margin-top: 8px; box-shadow: 0 8px 24px rgba(0,196,255,0.25);
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(0,196,255,0.35); }
    .login-btn:active { transform: translateY(0); }

    .login-error {
      background: rgba(255,60,60,0.12); border: 1px solid rgba(255,60,60,0.25);
      border-radius: 10px; padding: 10px 14px; color: #ff6b6b;
      font-size: 0.85rem; margin-bottom: 16px; display: none; text-align: center;
    }
    .login-error.show { display: block; }

    /* ===== TICKER BAR ===== */
    .ticker-bar {
      background: linear-gradient(90deg, #0a1e38, #0f2a4a, #0a1e38);
      border-bottom: 1px solid rgba(0,196,255,0.2);
      height: 34px; overflow: hidden; position: relative;
      flex-shrink: 0; display: flex; align-items: center;
    }
    .ticker-inner {
      display: inline-flex; align-items: center; gap: 0;
      white-space: nowrap;
      animation: tickerScroll 60s linear infinite;
    }
    .ticker-inner:hover { animation-play-state: paused; }
    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .ticker-item {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 0 36px;
      font-size: 0.78rem; font-weight: 500; color: #cbd5e1;
      letter-spacing: 0.3px;
    }
    .ticker-item::before { content: '◆'; color: #00c4ff; font-size: 0.55rem; opacity: 0.8; }
    .ticker-empty {
      display: inline-flex; align-items: center; padding: 0 20px;
      font-size: 0.75rem; color: rgba(255,255,255,0.25); font-style: italic;
    }
    .ticker-label {
      flex-shrink: 0; padding: 0 12px 0 14px;
      font-size: 0.68rem; font-weight: 700; color: #00c4ff;
      letter-spacing: 1.5px; text-transform: uppercase;
      border-right: 1px solid rgba(0,196,255,0.25); height: 100%;
      display: flex; align-items: center; background: rgba(0,196,255,0.06);
    }

    /* ===== MAIN APP SCREEN ===== */
    #main-screen {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity 0.5s;
    }
    #main-screen.visible { opacity: 1; pointer-events: all; }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(6,11,18,0.95);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 20px; height: 56px; flex-shrink: 0;
      backdrop-filter: blur(10px);
      position: relative; z-index: 50;
    }
    .top-bar-left {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; font-weight: 900; color: #fff; letter-spacing: 1px;
    }
    .top-bar-left span { color: #00c4ff; }

    .top-bar-center { display: flex; gap: 4px; }
    .nav-btn {
      padding: 7px 16px; border: none; border-radius: 8px;
      font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      color: rgba(255,255,255,0.45); background: transparent;
    }
    .nav-btn:hover { color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.05); }
    .nav-btn.active { color: #00c4ff; background: rgba(0,196,255,0.1); }

    .top-bar-right { display: flex; align-items: center; gap: 12px; }

    /* Online indicator */
    .online-pill {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 5px 12px 5px 8px;
      cursor: pointer; transition: all 0.2s; position: relative;
    }
    .online-pill:hover { background: rgba(255,255,255,0.09); }
    .online-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00e676; box-shadow: 0 0 8px #00e676;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .online-dot.break { background: #ffb300; box-shadow: 0 0 8px #ffb300; animation: none; }
    .online-dot.food { background: #ff7043; box-shadow: 0 0 8px #ff7043; animation: none; }
    @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    .online-label { font-size: 0.78rem; font-weight: 600; color: #00e676; }
    .online-label.break { color: #ffb300; }
    .online-label.food { color: #ff7043; }
    .online-count {
      background: rgba(0,196,255,0.15); border-radius: 12px;
      padding: 2px 8px; font-size: 0.72rem; font-weight: 700; color: #00c4ff;
    }

    /* Status dropdown */
    .status-dropdown {
      position: absolute; top: calc(100% + 10px); right: 0;
      background: #0f1e35; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 12px; min-width: 220px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      display: none; z-index: 9999;
    }
    .status-dropdown.open { display: block; }
    .status-dropdown-title {
      font-size: 0.7rem; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; padding: 0 4px;
    }
    .status-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px; border: none; border-radius: 10px;
      font-family: 'Outfit', sans-serif; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-bottom: 6px;
      color: #fff; background: rgba(255,255,255,0.04);
      text-align: left;
    }
    .status-btn:last-child { margin-bottom: 0; }
    .status-btn:hover { background: rgba(255,255,255,0.09); }
    .status-btn.active-status { background: rgba(0,230,118,0.12); color: #00e676; }
    .status-btn.break-status { background: rgba(255,179,0,0.12); color: #ffb300; }
    .status-btn.food-status { background: rgba(255,112,67,0.12); color: #ff7043; }
    .status-icon { font-size: 1rem; }

    /* Online users panel */
    .online-panel {
      position: fixed; top: 66px; right: 20px;
      background: #0f1e35; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 16px; min-width: 240px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      display: none; z-index: 9998; max-height: 60vh; overflow-y: auto;
    }
    .online-panel.open { display: block; }
    .online-panel-title {
      font-size: 0.7rem; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
    }
    .online-user-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .online-user-row:last-child { border-bottom: none; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; flex-shrink: 0;
    }
    .user-name { font-size: 0.88rem; font-weight: 600; color: #e2e8f0; }
    .user-status-badge {
      margin-left: auto; font-size: 0.72rem; font-weight: 700;
      padding: 3px 8px; border-radius: 8px;
    }
    .badge-online { background: rgba(0,230,118,0.15); color: #00e676; }
    .badge-break { background: rgba(255,179,0,0.15); color: #ffb300; }
    .badge-food { background: rgba(255,112,67,0.15); color: #ff7043; }

    /* Break timer */
    .break-timer-bar {
      display: none; align-items: center; justify-content: center; gap: 16px;
      background: rgba(255,179,0,0.08); border-bottom: 1px solid rgba(255,179,0,0.2);
      padding: 8px 20px; font-size: 0.85rem; color: #ffb300; font-weight: 600;
      flex-shrink: 0;
    }
    .break-timer-bar.food { background: rgba(255,112,67,0.08); border-color: rgba(255,112,67,0.2); color: #ff7043; }
    .break-timer-bar.visible { display: flex; }
    .break-end-btn {
      padding: 4px 14px; background: rgba(0,230,118,0.15); border: 1px solid rgba(0,230,118,0.3);
      border-radius: 8px; color: #00e676; font-family: 'Outfit',sans-serif;
      font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .break-end-btn:hover { background: rgba(0,230,118,0.25); }

    /* Content area */
    .content-area {
      flex: 1; overflow: hidden; position: relative;
    }

    /* App frame */
    #app-frame {
      width: 100%; height: 100%; border: none; display: none; background: transparent;
    }
    #app-frame.visible { display: block; }

    /* Admin panel */
    #admin-panel {
      display: none; width: 100%; height: 100%; overflow-y: auto;
      background: #0a1628;
      padding: 24px;
    }
    #admin-panel.visible { display: block; }

    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .admin-title {
      font-size: 1.4rem; font-weight: 700; color: #fff;
    }
    .admin-title span { color: #00c4ff; }

    .admin-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px;
    }
    @media(max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }

    .admin-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 20px;
    }
    .admin-card-title {
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px;
      color: rgba(255,255,255,0.35); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .admin-card-title span { color: #00c4ff; }

    .admin-input {
      width: 100%; padding: 10px 14px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px; color: #fff; font-family: 'Outfit',sans-serif;
      font-size: 0.9rem; outline: none; transition: border-color 0.2s; margin-bottom: 10px;
    }
    .admin-input:focus { border-color: rgba(0,196,255,0.4); }

    .admin-btn {
      padding: 10px 20px; border: none; border-radius: 10px;
      font-family: 'Outfit',sans-serif; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .admin-btn-primary { background: rgba(0,196,255,0.15); color: #00c4ff; border: 1px solid rgba(0,196,255,0.3); }
    .admin-btn-primary:hover { background: rgba(0,196,255,0.25); }
    .admin-btn-danger { background: rgba(255,60,60,0.12); color: #ff6b6b; border: 1px solid rgba(255,60,60,0.25); }
    .admin-btn-danger:hover { background: rgba(255,60,60,0.22); }
    .admin-btn-success { background: rgba(0,230,118,0.12); color: #00e676; border: 1px solid rgba(0,230,118,0.25); }
    .admin-btn-success:hover { background: rgba(0,230,118,0.22); }

    .user-list-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: rgba(255,255,255,0.03);
      border-radius: 10px; margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .user-list-info { display: flex; align-items: center; gap: 10px; }
    .user-list-name { font-size: 0.9rem; font-weight: 600; color: #e2e8f0; }
    .user-list-role { font-size: 0.72rem; padding: 2px 8px; border-radius: 6px; font-weight: 700; }
    .role-admin { background: rgba(0,196,255,0.15); color: #00c4ff; }
    .role-user { background: rgba(148,163,184,0.1); color: #94a3b8; }

    /* Report styles */
    .report-full {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 20px; margin-top: 0;
    }
    .report-user-block {
      border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 16px; margin-bottom: 16px;
    }
    .report-user-block:last-child { border-bottom: none; margin-bottom: 0; }
    .report-user-name {
      font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .report-stat-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px;
    }
    .report-stat {
      background: rgba(255,255,255,0.03); border-radius: 10px; padding: 10px 12px;
      text-align: center;
    }
    .report-stat-val { font-size: 1.1rem; font-weight: 700; color: #00c4ff; }
    .report-stat-lbl { font-size: 0.68rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
    .report-event-row {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 0.8rem; color: rgba(255,255,255,0.55); padding: 4px 0;
    }
    .report-event-time { color: #00c4ff; font-weight: 600; min-width: 60px; }
    .report-event-type { }

    /* Date filter */
    .date-filter {
      display: flex; gap: 10px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;
    }
    .date-filter input {
      padding: 8px 12px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 10px; color: #fff; font-family: 'Outfit',sans-serif; font-size: 0.88rem;
      outline: none;
    }
    .date-filter label { font-size: 0.78rem; color: rgba(255,255,255,0.4); letter-spacing: 1px; }

    /* Summary total */
    .summary-total {
      background: linear-gradient(135deg, rgba(0,196,255,0.08), rgba(0,100,150,0.05));
      border: 1px solid rgba(0,196,255,0.15); border-radius: 14px;
      padding: 16px 20px; margin-bottom: 20px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
    }
    .sum-stat { text-align: center; }
    .sum-stat-val { font-size: 1.3rem; font-weight: 700; color: #00c4ff; }
    .sum-stat-lbl { font-size: 0.68rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    /* Logout btn */
    .logout-btn {
      padding: 7px 16px; background: rgba(255,60,60,0.08);
      border: 1px solid rgba(255,60,60,0.2); border-radius: 10px;
      color: #ff6b6b; font-family: 'Outfit',sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { background: rgba(255,60,60,0.15); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(0,230,118,0.15); border: 1px solid rgba(0,230,118,0.3);
      color: #00e676; padding: 10px 20px; border-radius: 12px;
      font-size: 0.88rem; font-weight: 600; z-index: 9999;
      opacity: 0; transition: all 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: rgba(255,60,60,0.15); border-color: rgba(255,60,60,0.3); color: #ff6b6b; }
    .toast.warn { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.35); color: #fbbf24; }

    /* Loading */
    .loading-screen {
      position: fixed; inset: 0; background: #060b12;
      display: flex; align-items: center; justify-content: center;
      z-index: 300; transition: opacity 0.5s;
    }
    .loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 40px; height: 40px; border: 3px solid rgba(0,196,255,0.2);
      border-top-color: #00c4ff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* Change password */
    .change-pwd-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.06); }

    .status-btn.hat-status { background: rgba(150,100,255,0.12); color: #b085ff; }
    .online-dot.hat { background: #b085ff !important; }
    .online-label.hat { color: #b085ff !important; }
    .badge-hat { background: rgba(150,100,255,0.15); color: #b085ff; border: 1px solid rgba(150,100,255,0.3); }
    .break-timer-bar.hat { background: linear-gradient(135deg, rgba(150,100,255,0.15) 0%, rgba(80,40,160,0.08) 100%); border-color: rgba(150,100,255,0.3); }

    /* User detail popup */
    .user-detail-popup {
      position: fixed; z-index: 10000;
      background: #0f1e35; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px; padding: 18px 22px; min-width: 280px; max-width: 360px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
      pointer-events: none; opacity: 0; transition: opacity 0.18s;
      max-height: 80vh; overflow-y: auto;
    }
    .user-detail-popup.visible { opacity: 1; pointer-events: auto; }
    .udp-title { font-size: 0.7rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    .udp-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.82rem; }
    .udp-row:last-child { border-bottom: none; }
    .udp-label { color: rgba(255,255,255,0.4); }
    .udp-val { color: #e2e8f0; font-weight: 600; }

    /* Manager badge */
    .badge-manager { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }

    /* Admin override btn */
    .admin-override-btn {
      font-size: 0.72rem; padding: 4px 8px; border-radius: 8px;
      background: rgba(0,196,255,0.12); color: #00c4ff;
      border: 1px solid rgba(0,196,255,0.25); cursor: pointer;
      font-family: 'Outfit',sans-serif; font-weight: 600;
      transition: background 0.2s; margin-left: 6px;
    }
    .admin-override-btn:hover { background: rgba(0,196,255,0.22); }

    /* ===== TICKER BAR ===== */
    .ticker-bar {
      background: linear-gradient(90deg, #071628, #0d2240, #071628);
      border-bottom: 1px solid rgba(0,196,255,0.15);
      height: 32px; overflow: hidden; display: flex; align-items: center; flex-shrink: 0;
    }
    .ticker-label {
      flex-shrink: 0; padding: 0 12px; font-size: 0.63rem; font-weight: 700;
      color: #00c4ff; letter-spacing: 1.5px; text-transform: uppercase;
      border-right: 1px solid rgba(0,196,255,0.2); height: 100%; display: flex; align-items: center;
      background: rgba(0,196,255,0.05);
    }
    .ticker-scroll { overflow: hidden; flex: 1; }
    .ticker-inner {
      display: inline-flex; align-items: center; white-space: nowrap;
      animation: tickerMove 80s linear infinite;
    }
    .ticker-inner:hover { animation-play-state: paused; }
    @keyframes tickerMove { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .ticker-item {
      display: inline-flex; align-items: center; gap: 8px; padding: 0 40px;
      font-size: 0.77rem; color: #cbd5e1; font-weight: 500; letter-spacing: 0.2px;
    }
    .ticker-item::before { content: '●'; color: #00c4ff; font-size: 0.45rem; opacity: 0.7; }
    .ticker-empty { font-size: 0.72rem; color: rgba(255,255,255,0.2); padding: 0 20px; font-style: italic; }

    /* ===== NOTES SECTION ===== */
    .note-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 18px 20px; margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .note-card:hover { border-color: rgba(255,255,255,0.14); }
    .note-card.prio-critical { border-left: 4px solid #ef4444; }
    .note-card.prio-high { border-left: 4px solid #f97316; }
    .note-card.prio-medium { border-left: 4px solid #eab308; }
    .note-card.prio-low { border-left: 4px solid #22c55e; }
    .note-card.prio-template { border-left: 4px solid #a78bfa; }
    .note-badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
    }
    .note-badge.critical { background: rgba(239,68,68,0.15); color: #ef4444; }
    .note-badge.high { background: rgba(249,115,22,0.15); color: #f97316; }
    .note-badge.medium { background: rgba(234,179,8,0.15); color: #eab308; }
    .note-badge.low { background: rgba(34,197,94,0.15); color: #22c55e; }
    .note-badge.template { background: rgba(167,139,250,0.15); color: #a78bfa; }
    .note-title-text { font-size: 0.95rem; font-weight: 700; color: #e2e8f0; margin-bottom: 6px; }
    .note-body-text { font-size: 0.83rem; color: rgba(255,255,255,0.62); line-height: 1.65; white-space: pre-wrap; }
    .note-meta-text { font-size: 0.68rem; color: rgba(255,255,255,0.25); margin-top: 10px; }
    .note-edit-btn, .note-del-btn {
      padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); font-size: 0.74rem;
      cursor: pointer; font-family: 'Outfit',sans-serif; transition: all 0.2s;
    }
    .note-edit-btn:hover { background: rgba(0,196,255,0.12); color: #00c4ff; }
    .note-del-btn:hover { background: rgba(239,68,68,0.12); color: #ef4444; }
    .note-filter-btn {
      padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: rgba(255,255,255,0.4); font-size: 0.74rem;
      font-family: 'Outfit',sans-serif; cursor: pointer; transition: all 0.2s;
    }
    .note-filter-btn.active { background: rgba(0,196,255,0.1); color: #00c4ff; border-color: rgba(0,196,255,0.3); }
    .note-filter-btn:hover { color: rgba(255,255,255,0.7); }

    /* Extra admin card styles */
    .admin-btn-excel {
      background: rgba(34,197,94,0.15); color: #22c55e;
      border: 1px solid rgba(34,197,94,0.3);
      padding: 10px 20px; border-radius: 10px;
      font-family: 'Outfit',sans-serif; font-size: 0.88rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; display:inline-flex;align-items:center;gap:6px;
    }
    .admin-btn-excel:hover { background: rgba(34,197,94,0.28); }
    .log-date-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: rgba(255,255,255,0.03);
      border-radius: 10px; margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .log-user-row {
      display:flex;align-items:center;justify-content:space-between;
      padding:6px 10px;background:rgba(255,255,255,0.02);
      border-radius:8px;margin-bottom:4px;
      border:1px solid rgba(255,255,255,0.04);
    }
    .log-remove-btn {
      background:rgba(255,60,60,0.12);border:1px solid rgba(255,60,60,0.25);
      color:#ff6b6b;border-radius:50%;width:24px;height:24px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:0.75rem;font-weight:700;flex-shrink:0;
      transition:background 0.2s;
    }
    .log-remove-btn:hover{background:rgba(255,60,60,0.28);}
    .online-user-row { cursor: default; }
    .online-user-row.admin-clickable { cursor: pointer; }
    .online-user-row.admin-clickable:hover { background: rgba(255,255,255,0.05); border-radius: 8px; }
  </style>
</head>

<!-- Security -->
<script>
(function() {
  document.addEventListener("contextmenu", function(e) { e.preventDefault(); e.stopPropagation(); return false; }, true);
  document.addEventListener("mousedown", function(e) { if (e.button === 2) { e.preventDefault(); return false; } }, true);
  document.addEventListener("keydown", function(e) {
    if (e.keyCode === 123) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return false; }
    if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) { e.preventDefault(); return false; }
  }, true);
  document.addEventListener("selectstart", function(e) { e.preventDefault(); });
})();
</script>

<script>
// ============================================================
// STATE
// ============================================================
let currentUser = null;   // {name, role, uid}
let currentStatus = 'online';
let breakStartTime = null;
let breakInterval = null;
let sessionStartTime = null;
let sessionId = null;
let onlinePanelOpen = false;
let statusDropdownOpen = false;
let today = new Date().toISOString().slice(0,10); // YYYY-MM-DD

const COLORS = ['#00c4ff','#00e676','#ff7043','#ffb300','#ab47bc','#26c6da','#66bb6a','#ffa726'];

// ============================================================
// STARS
// ============================================================
(function() {
  const layer = document.getElementById('starsLayer');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;--op:${0.2+Math.random()*0.6}`;
    layer.appendChild(s);
  }
})();

// ============================================================
// WAIT FOR FIREBASE
// ============================================================
function waitFb(cb) {
  if (window._fbReady) { setTimeout(cb, 0); return; }
  window.addEventListener('fbReady', function() { setTimeout(cb, 0); }, { once: true });
  // Güvenlik: 15sn timeout
  var t = setTimeout(function() {
    if (!window._fbReady) { showLoginError('Firebase bağlantısı kurulamadı. Sayfayı yenileyin.'); }
  }, 15000);
  window.addEventListener('fbReady', function() { clearTimeout(t); }, { once: true });
}

// ============================================================
// UTILS
// ============================================================
function showToast(msg, type='success', duration=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type==='error' ? ' error' : type==='warn' ? ' warn' : '') + ' show';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.className = 'toast', duration);
}

function fmtDuration(ms) {
  if (!ms || ms < 0) return '00:00:00';
  const s = Math.floor(ms/1000), m = Math.floor(s/60), h = Math.floor(m/60);
  return String(h).padStart(2,'0')+':'+String(m%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}

function fmtTime(ts) {
  if (!ts) return '--';
  return new Date(ts).toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function getToday() {
  return new Date().toISOString().slice(0,10);
}

function hashPassword(pwd) {
  // Simple hash: XOR based obfuscation + base64 — not cryptographic but hides from plain text
  let h = 0;
  for (let i = 0; i < pwd.length; i++) {
    h = ((h << 5) - h) + pwd.charCodeAt(i);
    h |= 0;
  }
  return btoa('c36:' + Math.abs(h).toString(16) + ':' + pwd.length);
}

// ============================================================
// LOGIN
// ============================================================
let loginMode = 'user'; // 'user' | 'admin'

function switchLoginTab(mode) {
  loginMode = mode;
  document.getElementById('tab-user').className = 'login-tab' + (mode==='user'?' active':'');
  document.getElementById('tab-admin').className = 'login-tab' + (mode==='admin'?' active':'');
  document.getElementById('login-error').className = 'login-error';
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.className = 'login-error show';
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { showLoginError('Kullanıcı adı ve şifre gerekli.'); return; }

  waitFb(async () => {
    const { db, ref, get } = window._fb;
    try {
      if (loginMode === 'admin') {
        // Check admin credentials
        const adminRef = await get(ref(db, 'config/admin'));
        const adminData = adminRef.val();
        if (!adminData) {
          // First time setup
          showLoginError('Admin henüz kurulmamış. Kullanıcı girişinden devam edin.');
          return;
        }
        if (adminData.username !== username || adminData.passwordHash !== hashPassword(password)) {
          showLoginError('Yönetici adı veya şifre hatalı.');
          return;
        }
        currentUser = { name: username, role: 'admin', uid: 'admin_' + username };
      } else {
        // Check user credentials
        const usersRef = await get(ref(db, 'users'));
        const users = usersRef.val() || {};
        let found = null;
        for (const [uid, u] of Object.entries(users)) {
          if (u.username === username && u.passwordHash === hashPassword(password) && u.active !== false) {
            found = { name: u.displayName || username, role: u.role || 'user', uid, username: u.username };
            break;
          }
        }
        if (!found) { showLoginError('Kullanıcı adı veya şifre hatalı.'); return; }
        currentUser = found;
        // Manager gets admin panel access but not full admin perms

      }
      enterMainApp();
    } catch(e) {
      showLoginError('Bağlantı hatası. Tekrar deneyin.');
      console.error(e);
    }
  });
}

function enterMainApp() {
  // Hide login
  document.getElementById('login-screen').classList.add('hidden');

  // Show main
  const main = document.getElementById('main-screen');
  main.classList.add('visible');

  // Admin/manager nav
  if (currentUser.role === 'admin' || currentUser.role === 'manager') {
    document.getElementById('nav-admin').style.display = '';
  }

  // Load app iframe
  const frame = document.getElementById('app-frame');
  const appHtml = decodeURIComponent(escape(atob(APP_B64)));
  const blob = new Blob([appHtml], { type: 'text/html;charset=utf-8' });
  frame.src = URL.createObjectURL(blob);
  frame.classList.add('visible');

  // Start session
  sessionStartTime = Date.now();
  sessionId = 'sess_' + Date.now() + '_' + currentUser.uid;
  setPresence('online');
  listenPresence();
  listenTicker();
  listenNotes();
  logEvent('login', 'Giriş yapıldı');
  startIdleTimer(); // otomatik çıkış başlat

  document.getElementById('loadingScreen').classList.add('hidden');
}

async function setPresence(status) {
  currentStatus = status;
  const { db, ref, set } = window._fb;
  await set(ref(db, 'presence/' + currentUser.uid), {
    name: currentUser.name,
    uid: currentUser.uid,
    role: currentUser.role || 'user',
    status: status,
    updatedAt: Date.now(),
    sessionStart: sessionStartTime,
    date: getToday()
  });
  updateStatusUI(status);
}

function updateStatusUI(status) {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  dot.className = 'online-dot' + (status==='break'?' break':status==='food'?' food':status==='hat'?' hat':'');
  label.className = 'online-label' + (status==='break'?' break':status==='food'?' food':status==='hat'?' hat':'');
  label.textContent = status==='online' ? 'Çevrim İçi' : status==='break' ? 'Mola' : status==='food' ? 'Yemek Molası' : 'Hat Kapalı';
}

function listenPresence() {
  const { db, ref, onValue } = window._fb;
  onValue(ref(db, 'presence'), (snap) => {
    const data = snap.val() || {};
    const todayStr = getToday();
    const entries = Object.values(data).filter(u => u.date === todayStr);
    const count = entries.length;
    document.getElementById('onlineCount').textContent = count;
    renderOnlineUsers(entries);
  });
}

function renderOnlineUsers(users) {
  const list = document.getElementById('onlineUsersList');
  if (!users.length) {
    list.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:0.85rem;text-align:center;padding:12px 0;">Çevrimiçi personel yok</div>';
    return;
  }
  const isAdminOrManager = currentUser && (currentUser.role === 'admin' || currentUser.role === 'manager');
  let h = '';
  users.forEach((u, i) => {
    const color = COLORS[i % COLORS.length];
    const initial = u.name.charAt(0).toUpperCase();
    const badgeClass = u.status === 'break' ? 'badge-break' : u.status === 'food' ? 'badge-food' : u.status === 'hat' ? 'badge-hat' : 'badge-online';
    const badgeText = u.status === 'online' ? 'Çevrim İçi' : u.status === 'break' ? 'Mola' : u.status === 'food' ? 'Yemek Molası' : 'Hat Kapalı';
    const clickHandler = isAdminOrManager ? `onclick="showUserDetail(event, '${u.uid}', '${u.name.replace(/'/g,"\\'")}', '${u.status}', ${u.updatedAt||0}, ${u.sessionStart||0})"` : '';
    const rowClass = isAdminOrManager ? 'online-user-row admin-clickable' : 'online-user-row';
    h += `<div class="${rowClass}" ${clickHandler}>
      <div class="user-avatar" style="background:${color}22;color:${color}">${initial}</div>
      <div class="user-name" style="flex:1">${u.name}</div>
      <span class="user-status-badge ${badgeClass}">${badgeText}</span>
      ${isAdminOrManager ? '<span style="font-size:0.7rem;color:rgba(255,255,255,0.2);margin-left:4px;">ℹ️</span>' : ''}
    </div>`;
  });
  list.innerHTML = h;
}

function showUserDetail(event, uid, name, status, updatedAt, sessionStart) {
  event.stopPropagation();
  const popup = document.getElementById('userDetailPopup');
  const sinceMs = updatedAt ? (Date.now() - updatedAt) : 0;
  const sessionMs = sessionStart ? (Date.now() - sessionStart) : 0;
  const statusLabel = status === 'online' ? '🟢 Çevrim İçi' : status === 'break' ? '☕ Mola' : status === 'food' ? '🍽️ Yemek Molası' : '📵 Hat Kapalı';
  const statusColor = status === 'online' ? '#00e676' : status === 'break' ? '#ffb300' : status === 'food' ? '#ff7043' : '#b085ff';
  const x = Math.min(event.clientX + 10, window.innerWidth - 330);
  const y = Math.min(event.clientY + 10, window.innerHeight - 240);
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  const isAdminOrMgr = currentUser && (currentUser.role === 'admin' || currentUser.role === 'manager');
  const sf = (s) => s.replace(/'/g, "\\'");
  const overrideBtns = isAdminOrMgr ? `
    <div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.08);display:flex;gap:6px;flex-wrap:wrap;">
      ${status !== 'online' ? `<button class="admin-override-btn" onclick="closeUserDetail();adminEndBreak('${uid}','${sf(name)}','${status}')">✅ Molayı Bitir</button>` : ''}
      <button class="admin-override-btn" onclick="closeUserDetail();adminStartBreak('${uid}','${sf(name)}','break')" ${status==='break'?'disabled':''}>☕ Mola Başlat</button>
      <button class="admin-override-btn" onclick="closeUserDetail();adminStartBreak('${uid}','${sf(name)}','food')" ${status==='food'?'disabled':''}>🍽️ Yemek Başlat</button>
      <button class="admin-override-btn" onclick="closeUserDetail();adminStartBreak('${uid}','${sf(name)}','hat')" ${status==='hat'?'disabled':''}>📵 Hat Kapat</button>
    </div>` : '';
  popup.innerHTML = `
    <div class="udp-title">👤 ${name}</div>
    <div class="udp-row"><span class="udp-label">Durum</span><span class="udp-val" style="color:${statusColor}">${statusLabel}</span></div>
    <div class="udp-row"><span class="udp-label">Bu durumda</span><span class="udp-val">${fmtDuration(sinceMs)}</span></div>
    <div class="udp-row"><span class="udp-label">Oturum süresi</span><span class="udp-val">${fmtDuration(sessionMs)}</span></div>
    ${overrideBtns}
    <div style="font-size:0.68rem;color:rgba(255,255,255,0.2);margin-top:10px;text-align:center">Kapatmak için dışarı tıkla</div>
  `;
  popup.classList.add('visible');
  setTimeout(() => document.addEventListener('click', closeUserDetail, {once:true}), 50);
}

async function adminEndBreak(uid, name, currentSt) {

async function setStatus(status) {
  statusDropdownOpen = false;
  document.getElementById('statusDropdown').className = 'status-dropdown';
  document.getElementById('onlinePanel').className = 'online-panel';

  if (status === currentStatus) return;

  if (status === 'break' || status === 'food' || status === 'hat') {
    if (breakInterval) { clearInterval(breakInterval); breakInterval = null; }
    breakStartTime = Date.now();
    await setPresence(status);
    const evType = status === 'break' ? 'break_start' : status === 'food' ? 'food_start' : 'hat_start';
    const evDesc = status === 'break' ? 'Molaya çıktı' : status === 'food' ? 'Yemek molasına çıktı' : 'Hat kapalıya geçti';
    logEvent(evType, evDesc);
    startBreakTimer(status);
  } else if (status === 'online') {
    await endBreak();
  }
}

function startBreakTimer(status) {
  const bar = document.getElementById('breakTimerBar');
  const label = document.getElementById('breakTimerLabel');
  const clock = document.getElementById('breakTimerClock');
  label.textContent = status === 'break' ? '☕ Mola' : status === 'food' ? '🍽️ Yemek Molası' : '📵 Hat Kapalı';
  bar.className = 'break-timer-bar' + (status === 'food' ? ' food' : status === 'hat' ? ' hat' : '') + ' visible';

  breakInterval = setInterval(() => {
    const elapsed = Date.now() - breakStartTime;
    clock.textContent = fmtDuration(elapsed);
  }, 1000);
}

async function endBreak() {
  if (breakInterval) {
    clearInterval(breakInterval); breakInterval = null;
    const duration = Date.now() - breakStartTime;
    const endType = currentStatus === 'food' ? 'food_end' : currentStatus === 'hat' ? 'hat_end' : 'break_end';
    const endDesc = currentStatus === 'food' ? 'Yemek molası bitti' : currentStatus === 'hat' ? 'Hat kapalı bitti' : 'Mola bitti';
    logEvent(endType, endDesc + ' — Süre: ' + fmtDuration(duration), duration);
    breakStartTime = null;
  }
  document.getElementById('breakTimerBar').className = 'break-timer-bar';
  await setPresence('online');
}

// ============================================================
// IDLE / OTOMATİK ÇIKIŞ (1 SAAT)
// ============================================================
const IDLE_TIMEOUT_MS  = 60 * 60 * 1000; // 60 dakika
const IDLE_WARN_MS     = 55 * 60 * 1000; // 55. dakikada uyarı
let _idleLogoutTimer   = null;
let _idleWarnTimer     = null;
let _idleWarnShown     = false;

function resetIdleTimer() {
  if (!currentUser) return; // giriş yapılmamışsa çalışma

  clearTimeout(_idleLogoutTimer);
  clearTimeout(_idleWarnTimer);
  _idleWarnShown = false;

  // 55. dakikada uyarı
  _idleWarnTimer = setTimeout(() => {
    if (!currentUser) return;
    _idleWarnShown = true;
    showToast('⚠️ 5 dakika içinde otomatik çıkış yapılacak! Devam etmek için ekrana tıklayın.', 'warn', 10000);
  }, IDLE_WARN_MS);

  // 60. dakikada otomatik çıkış
  _idleLogoutTimer = setTimeout(async () => {
    if (!currentUser) return;
    showToast('⏱️ 1 saat işlem yapılmadığı için otomatik çıkış yapıldı.', 'warn', 5000);
    await doLogout();
  }, IDLE_TIMEOUT_MS);
}

function startIdleTimer() {
  const events = ['mousemove','mousedown','keydown','touchstart','scroll','click'];
  events.forEach(ev => document.addEventListener(ev, resetIdleTimer, { passive: true }));
  resetIdleTimer(); // ilk tetik
}

function stopIdleTimer() {
  clearTimeout(_idleLogoutTimer);
  clearTimeout(_idleWarnTimer);
  const events = ['mousemove','mousedown','keydown','touchstart','scroll','click'];
  events.forEach(ev => document.removeEventListener(ev, resetIdleTimer));
}

      <div style="font-size:0.8rem;color:rgba(255,255,255,0.4);margin-bottom:14px;">Personelin "Notlar" sekmesinde göreceği özel notları buradan da yönetebilirsiniz.</div>
      <button class="admin-btn admin-btn-primary" onclick="showSection('notes')">📌 Notlar Bölümüne Git</button>
    </div>
  `;
  renderTickerAdmin();
}

// ============================================================
// YARDIMCI: HTML KAÇIŞ
// ============================================================
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

// ============================================================
// DUYURULAR (TICKER)
// ============================================================
let _tickerData = {};

function tickerItemsSorted() {
  return Object.keys(_tickerData).map(function(id) {
    const v = _tickerData[id];
    return {
      id: id,
      text: (typeof v === 'string') ? v : ((v && v.text) || ''),
      createdAt: (v && v.createdAt) || 0
    };
  }).filter(function(x) { return x.text.trim() !== ''; })
    .sort(function(a, b) { return a.createdAt - b.createdAt; });
}

function listenTicker() {
  const { db, ref, onValue } = window._fb;
  onValue(ref(db, 'ticker'), function(snap) {
    _tickerData = snap.val() || {};
    renderTicker();
    const ap = document.getElementById('admin-panel');
    if (ap && ap.classList.contains('visible')) renderTickerAdmin();
  });
}

function renderTicker() {
  const inner = document.getElementById('tickerInner');
  if (!inner) return;
  const items = tickerItemsSorted();
  if (!items.length) {
    inner.innerHTML = '<span class="ticker-empty" id="tickerEmpty">Henüz duyuru girilmedi.</span>';
    return;
  }
  // Kesintisiz kayma için iki kez yazıyoruz (animasyon -50% kaydırıyor)
  const block = items.map(function(i) {
    return '<span class="ticker-item">' + escapeHtml(i.text) + '</span>';
  }).join('');
  inner.innerHTML = block + block;
}

function renderTickerAdmin() {
  const list = document.getElementById('ticker-list-admin');
  if (!list) return;
  const items = tickerItemsSorted();
  if (!items.length) {
    list.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:0.82rem;padding:4px 0;">Henüz duyuru yok.</div>';
    return;
  }
  list.innerHTML = items.map(function(i) {
    return '<div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 10px;margin-bottom:6px;">'
      + '<span style="flex:1;font-size:0.85rem;color:#cbd5e1;">' + escapeHtml(i.text) + '</span>'
      + '<button class="admin-btn admin-btn-danger" style="padding:4px 10px;font-size:0.72rem;flex-shrink:0;" onclick="deleteTickerItem(\'' + i.id + '\')">🗑️ Sil</button>'
      + '</div>';
  }).join('');
}

async function addTickerItem() {
  const input = document.getElementById('ticker-new-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) { showToast('Duyuru metni boş olamaz.', 'warn'); return; }
  try {
    const { db, ref, set } = window._fb;
    const id = 't_' + Date.now();
    await set(ref(db, 'ticker/' + id), { text: text, createdAt: Date.now() });
    input.value = '';
    showToast('Duyuru eklendi.');
  } catch (e) {
    console.error(e);
    showToast('Duyuru eklenemedi.', 'error');
  }
}

async function deleteTickerItem(id) {
  if (!confirm('Bu duyuruyu silmek istiyor musunuz?')) return;
  try {
    const { db, ref, remove } = window._fb;
    await remove(ref(db, 'ticker/' + id));
    showToast('Duyuru silindi.');
  } catch (e) {
    console.error(e);
    showToast('Duyuru silinemedi.', 'error');
  }
}

// ============================================================
// NOTLAR (NOTES)
// ============================================================
let _notesData = {};

function notesSorted() {
  return Object.keys(_notesData).map(function(id) {
    const v = _notesData[id] || {};
    return {
      id: id,
      text: (typeof v === 'string') ? v : (v.text || ''),
      createdAt: v.createdAt || 0,
      author: v.author || ''
    };
  }).filter(function(x) { return x.text.trim() !== ''; })
    .sort(function(a, b) { return b.createdAt - a.createdAt; });
}

function listenNotes() {
  const { db, ref, onValue } = window._fb;
  onValue(ref(db, 'notes'), function(snap) {
    _notesData = snap.val() || {};
    const np = document.getElementById('notes-panel');
    if (np && np.style.display !== 'none') renderNotesPanel();
  });
}

function renderNotesPanel() {
  const panel = document.getElementById('notes-panel');
  if (!panel) return;
  const isAdminOrManager = currentUser && (currentUser.role === 'admin' || currentUser.role === 'manager');
  const items = notesSorted();

  let addBox = '';
  if (isAdminOrManager) {
    addBox = '<div class="admin-card" style="margin-bottom:20px;">'
      + '<div class="admin-card-title">📌 <span>Yeni Not</span> Ekle</div>'
      + '<textarea class="admin-input" id="note-new-input" placeholder="Not metni..." style="min-height:80px;resize:vertical;"></textarea>'
      + '<button class="admin-btn admin-btn-primary" onclick="addNote()">➕ Notu Ekle</button>'
      + '</div>';
  }

  let listHTML;
  if (!items.length) {
    listHTML = '<div style="color:rgba(255,255,255,0.3);font-size:0.9rem;text-align:center;padding:24px;">Henüz not eklenmemiş.</div>';
  } else {
    listHTML = items.map(function(n) {
      const date = n.createdAt ? new Date(n.createdAt).toLocaleString('tr-TR') : '';
      const delBtn = isAdminOrManager
        ? '<button class="admin-btn admin-btn-danger" style="padding:4px 10px;font-size:0.72rem;flex-shrink:0;" onclick="deleteNote(\'' + n.id + '\')">🗑️ Sil</button>'
        : '';
      return '<div class="admin-card" style="margin-bottom:12px;">'
        + '<div style="display:flex;gap:10px;align-items:flex-start;">'
        + '<div style="flex:1;white-space:pre-wrap;color:#e2e8f0;font-size:0.92rem;line-height:1.5;">' + escapeHtml(n.text) + '</div>'
        + delBtn
        + '</div>'
        + (date ? '<div style="font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:8px;">' + escapeHtml(n.author) + (n.author ? ' • ' : '') + date + '</div>' : '')
        + '</div>';
    }).join('');
  }

  panel.innerHTML = '<div style="max-width:760px;margin:0 auto;">'
    + '<h2 style="color:#fff;font-size:1.3rem;margin-bottom:18px;">📌 Notlar</h2>'
    + addBox + listHTML + '</div>';
}

async function addNote() {
  const input = document.getElementById('note-new-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) { showToast('Not metni boş olamaz.', 'warn'); return; }
  try {
    const { db, ref, set } = window._fb;
    const id = 'n_' + Date.now();
    await set(ref(db, 'notes/' + id), {
      text: text,
      createdAt: Date.now(),
      author: (currentUser && currentUser.name) || ''
    });
    input.value = '';
    showToast('Not eklendi.');
  } catch (e) {
    console.error(e);
    showToast('Not eklenemedi.', 'error');
  }
}

async function deleteNote(id) {
  if (!confirm('Bu notu silmek istiyor musunuz?')) return;
  try {
    const { db, ref, remove } = window._fb;
    await remove(ref(db, 'notes/' + id));
    showToast('Not silindi.');
  } catch (e) {
    console.error(e);
    showToast('Not silinemedi.', 'error');
  }
}

// ============================================================
// ŞİFREM (KULLANICININ KENDİ ŞİFRESİ)
// ============================================================
function renderUserPwdPanel() {
  const panel = document.getElementById('user-pwd-panel');
  if (!panel) return;
  panel.innerHTML = '<div style="max-width:480px;margin:0 auto;">'
    + '<h2 style="color:#fff;font-size:1.3rem;margin-bottom:18px;">🔑 Şifrem</h2>'
    + '<div class="admin-card">'
    + '<div class="admin-card-title">🔐 <span>Şifreni</span> Değiştir</div>'
    + '<input class="admin-input" type="password" id="my-old-pwd" placeholder="Mevcut şifre" />'
    + '<input class="admin-input" type="password" id="my-new-pwd" placeholder="Yeni şifre" />'
    + '<input class="admin-input" type="password" id="my-new-pwd2" placeholder="Yeni şifre (tekrar)" />'
    + '<button class="admin-btn admin-btn-primary" onclick="changeMyPassword()">🔄 Şifreyi Değiştir</button>'
    + '</div></div>';
}

async function changeMyPassword() {
  const oldEl = document.getElementById('my-old-pwd');
  const n1El = document.getElementById('my-new-pwd');
  const n2El = document.getElementById('my-new-pwd2');
  const oldPwd = oldEl.value, n1 = n1El.value, n2 = n2El.value;
  if (!oldPwd || !n1 || !n2) { showToast('Tüm alanları doldurun.', 'warn'); return; }
  if (n1 !== n2) { showToast('Yeni şifreler eşleşmiyor.', 'error'); return; }
  if (n1.length < 4) { showToast('Yeni şifre en az 4 karakter olmalı.', 'warn'); return; }
  try {
    const { db, ref, get, set, update } = window._fb;
    if (currentUser.uid && currentUser.uid.indexOf('admin_') === 0) {
      // Admin kullanıcısı → config/admin
      const snap = await get(ref(db, 'config/admin'));
      const admin = snap.val();
      if (!admin || admin.passwordHash !== hashPassword(oldPwd)) { showToast('Mevcut şifre hatalı.', 'error'); return; }
      await update(ref(db, 'config/admin'), { passwordHash: hashPassword(n1) });
    } else {
      const snap = await get(ref(db, 'users/' + currentUser.uid));
      const u = snap.val();
      if (!u || u.passwordHash !== hashPassword(oldPwd)) { showToast('Mevcut şifre hatalı.', 'error'); return; }
      await update(ref(db, 'users/' + currentUser.uid), { passwordHash: hashPassword(n1) });
    }
    oldEl.value = ''; n1El.value = ''; n2El.value = '';
    showToast('Şifre güncellendi.');
  } catch (e) {
    console.error(e);
    showToast('Şifre güncellenemedi.', 'error');
  }
}

// ============================================================
// PERSONEL YÖNETİMİ (ADMIN)
// ============================================================
async function addUser() {
  const dn = document.getElementById('new-displayname').value.trim();
  const un = document.getElementById('new-username').value.trim();
  const pw = document.getElementById('new-password').value;
  const role = document.getElementById('new-role').value;
  if (!dn || !un || !pw) { showToast('Ad, kullanıcı adı ve şifre gerekli.', 'warn'); return; }
  try {
    const { db, ref, get, set } = window._fb;
    const usersSnap = await get(ref(db, 'users'));
    const users = usersSnap.val() || {};
    const exists = Object.values(users).some(function(u) { return u.username === un && u.active !== false; });
    if (exists) { showToast('Bu kullanıcı adı zaten kullanılıyor.', 'error'); return; }
    const id = 'u_' + Date.now();
    await set(ref(db, 'users/' + id), {
      username: un, displayName: dn, passwordHash: hashPassword(pw),
      role: role || 'user', active: true
    });
    showToast('Personel eklendi.');
    renderAdminPanel();
  } catch (e) {
    console.error(e);
    showToast('Personel eklenemedi.', 'error');
  }
}

let _editingUserUid = null;
function editUser(uid, displayName, username, role) {
  _editingUserUid = uid;
  const modal = document.getElementById('editUserModal');
  document.getElementById('edit-displayname').value = displayName || '';
  document.getElementById('edit-username').value = username || '';
  document.getElementById('edit-role').value = role || 'user';
  const p1 = document.getElementById('edit-new-password'); if (p1) p1.value = '';
  const p2 = document.getElementById('edit-newpwd'); if (p2) p2.value = '';
  modal.style.display = 'flex';
}

async function saveEditUser() {
  if (!_editingUserUid) return;
  const dn = document.getElementById('edit-displayname').value.trim();
  const un = document.getElementById('edit-username').value.trim();
  const role = document.getElementById('edit-role').value;
  const p1 = document.getElementById('edit-new-password');
  const p2 = document.getElementById('edit-newpwd');
  const newPwd = (p1 && p1.value) ? p1.value : (p2 && p2.value ? p2.value : '');
  if (!dn || !un) { showToast('Ad ve kullanıcı adı gerekli.', 'warn'); return; }
  try {
    const { db, ref, update } = window._fb;
    const patch = { displayName: dn, username: un, role: role || 'user' };
    if (newPwd) patch.passwordHash = hashPassword(newPwd);
    await update(ref(db, 'users/' + _editingUserUid), patch);
    document.getElementById('editUserModal').style.display = 'none';
    _editingUserUid = null;
    showToast('Kullanıcı güncellendi.');
    renderAdminPanel();
  } catch (e) {
    console.error(e);
    showToast('Güncellenemedi.', 'error');
  }
}

async function deleteUser(uid, name) {
  if (!confirm((name || 'Bu kullanıcı') + ' silinsin mi?')) return;
  try {
    const { db, ref, remove } = window._fb;
    await remove(ref(db, 'users/' + uid));
    showToast('Kullanıcı silindi.');
    renderAdminPanel();
  } catch (e) {
    console.error(e);
    showToast('Silinemedi.', 'error');
  }
}

async function changeAdminPwd() {
  const oldPwd = document.getElementById('old-pwd').value;
  const n1 = document.getElementById('new-pwd').value;
  const n2 = document.getElementById('new-pwd2').value;
  if (!oldPwd || !n1 || !n2) { showToast('Tüm alanları doldurun.', 'warn'); return; }
  if (n1 !== n2) { showToast('Yeni şifreler eşleşmiyor.', 'error'); return; }
  if (n1.length < 4) { showToast('Yeni şifre en az 4 karakter olmalı.', 'warn'); return; }
  try {
    const { db, ref, get, update } = window._fb;
    const snap = await get(ref(db, 'config/admin'));
    const admin = snap.val();
    if (!admin || admin.passwordHash !== hashPassword(oldPwd)) { showToast('Mevcut şifre hatalı.', 'error'); return; }
    await update(ref(db, 'config/admin'), { passwordHash: hashPassword(n1) });
    document.getElementById('old-pwd').value = '';
    document.getElementById('new-pwd').value = '';
    document.getElementById('new-pwd2').value = '';
    showToast('Yönetici şifresi güncellendi.');
  } catch (e) {
    console.error(e);
    showToast('Şifre güncellenemedi.', 'error');
  }
}

// ============================================================
// ADMIN DURUM MÜDAHALESİ (mola başlat/yemek/hat)
// ============================================================
async function adminStartBreak(uid, name, status) {
  try {
    const { db, ref, get, set } = window._fb;
    const presSnap = await get(ref(db, 'presence/' + uid));
    const pres = presSnap.val();
    if (!pres) { showToast('Personel aktif değil.', 'warn'); return; }
    await set(ref(db, 'presence/' + uid), Object.assign({}, pres, { status: status, updatedAt: Date.now() }));
    const labels = { break: 'Mola', food: 'Yemek molası', hat: 'Hat kapalı' };
    showToast(name + ' → ' + (labels[status] || status));
  } catch (e) {
    console.error(e);
    showToast('İşlem başarısız.', 'error');
  }
}

// ============================================================
// FIREBASE HAZIR → LOADİNG EKRANI KAPAT
// ============================================================
waitFb(async () => {
  try {
    const { db, ref, get, set } = window._fb;
    const snap = await get(ref(db, 'config/admin'));
    if (!snap.val()) {
      await set(ref(db, 'config/admin'), {
        username: 'admin',
        passwordHash: hashPassword('Casa36Admin!')
      });
    }
  } catch(e) { console.error('Init error:', e); }
  // Loading ekranını kapat - login ekranını göster
  const ls = document.getElementById('loadingScreen');
  if (ls) ls.classList.add('hidden');
});

// Güvenlik: 8 saniye sonra hala açıksa zorla kapat
setTimeout(function() {
  const ls = document.getElementById('loadingScreen');
  if (ls && !ls.classList.contains('hidden')) {
    ls.classList.add('hidden');
    console.warn('Loading timeout - force closed');
  }
}, 100);
</script>
